<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>统一登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 夜间模式（默认） ── */
    :root {
      --bg: #111111;
      --surface: #1A1A1A;
      --surface2: #242424;
      --surface3: #1E1E1E;
      --divider: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --border-focus: #BCDC3C;
      --accent: #CCEE44;
      --accent2: #ECFFAF;
      --accent-glow: rgba(188,220,60,0.2);
      --text: #F2F2F0;
      --text-muted: #888880;
      --text-dim: #555550;
      --success: #5CB85C;
      --error: #E05252;
      --card-shadow: 0 24px 60px rgba(0,0,0,0.7);
      --left-bg: #141414;
      --qr-border: rgba(255,255,255,0.1);
      --oauth-hover: rgba(236,255,175,0.06);
    }

    /* ── 白日模式 ── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F0F0EC;
        --surface: #FFFFFF;
        --surface2: #ECFFAF;
        --surface3: #F6FFDA;
        --divider: rgba(0,0,0,0.08);
        --border: rgba(0,0,0,0.12);
        --border-focus: #7AAA00;
        --accent: #5A8A00;
        --accent2: #7AAA00;
        --accent-glow: rgba(90,138,0,0.15);
        --text: #111110;
        --text-muted: #555548;
        --text-dim: #AAAAAA;
        --success: #3D8C3D;
        --error: #CC2222;
        --card-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.06);
        --left-bg: #ECFFAF;
        --qr-border: rgba(0,0,0,0.12);
        --oauth-hover: rgba(0,0,0,0.04);
      }
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before { display: none; }

    .layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative; z-index: 1;
    }

    /* ── 主卡片：左右分栏 ── */
    .card {
      display: flex;
      width: 100%;
      max-width: 820px;
      min-height: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    /* ══════════════════════════════
       左侧：第三方登录
    ══════════════════════════════ */
    .left {
      width: 300px;
      flex-shrink: 0;
      background: var(--left-bg);
      border-right: 1px solid var(--divider);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 28px;
    }

    .left-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      align-self: flex-start;
    }

    /* 微信二维码区 */
    .qr-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .qr-box {
      width: 154px; height: 154px;
      border: 1px solid var(--qr-border);
      border-radius: 2px;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .qr-box:hover { border-color: var(--accent); }

    /* 伪二维码 SVG 图案 */
    .qr-svg {
      width: 116px; height: 116px;
      opacity: 0.18;
    }

    .qr-overlay {
      position: absolute; inset: 0;
      background: rgba(120,100,255,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 2px;
    }

    .qr-box:hover .qr-overlay { opacity: 1; }

    .qr-overlay span {
      color: #fff; font-size: 12px; font-weight: 600;
    }

    .qr-refresh-icon {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .qr-label {
      margin-top: 11px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qr-label svg { opacity: 0.7; }

    /* 分割线 */
    .left-divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: var(--text-dim);
      font-size: 11px;
    }
    .left-divider::before, .left-divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--divider);
    }

    /* 其他 OAuth 按钮 */
    .oauth-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .oauth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      text-align: left;
    }

    .oauth-btn:hover {
      background: var(--oauth-hover);
      border-color: rgba(120,100,255,0.3);
      transform: translateX(2px);
    }

    .oauth-icon {
      width: 24px; height: 24px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .oauth-name { flex: 1; }
    .oauth-arrow { color: var(--text-dim); font-size: 14px; }

    /* ══════════════════════════════
       右侧：账号登录
    ══════════════════════════════ */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 44px 48px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      border-radius: 2px;
      background: var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 3px 14px var(--accent-glow);
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    /* 登录方式切换 */
    .login-modes {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--divider);
      margin-bottom: 28px;
    }

    .mode-btn {
      padding: 9px 20px 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      margin-bottom: -1px;
    }

    .mode-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* 面板 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 字段 */
    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      display: flex; align-items: center;
    }

    input[type="text"], input[type="email"],
    input[type="password"], input[type="tel"] {
      width: 100%;
      padding: 11px 13px 11px 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(120,100,255,0.1);
    }

    input::placeholder { color: var(--text-dim); }

    /* 无图标输入 */
    input.no-icon { padding-left: 13px; }

    /* 验证码行 */
    .code-row { display: flex; gap: 10px; }
    .code-row input { flex: 1; }

    .btn-send {
      padding: 0 16px;
      height: 44px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--accent2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      font-family: inherit;
      flex-shrink: 0;
    }

    .btn-send:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(120,100,255,0.08);
    }

    .btn-send:disabled { color: var(--text-dim); cursor: default; }

    /* 主按钮 */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.18s, transform 0.15s, box-shadow 0.18s;
      box-shadow: 0 4px 20px var(--accent-glow);
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }

    /* 辅助链接行 */
    .aux-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }

    .aux-links a, .aux-links button {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.18s;
    }

    .aux-links a:hover, .aux-links button:hover { color: var(--accent2); }
    .aux-dot { color: var(--text-dim); font-size: 10px; }

    /* 提示 */
    .tip {
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 2px;
      margin-bottom: 14px;
      display: none;
    }

    .tip.success { background: rgba(52,211,153,0.08); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
    .tip.error   { background: rgba(248,113,113,0.08); color: var(--error);   border: 1px solid rgba(248,113,113,0.2); }
    .tip.show { display: block; }

    /* 密码强度 */
    .pw-strength { display: flex; gap: 4px; margin-top: 7px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--surface2); transition: background 0.3s; }

    /* 底部 */
    .footer {
      margin-top: auto;
      padding-top: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.9;
    }

    .footer a { color: var(--text-muted); text-decoration: none; }
    .footer a:hover { color: var(--accent2); }

    /* 手机号前缀 */
    .phone-prefix {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
      font-weight: 500;
    }

    /* ── 左侧面板切换动画 ── */
    .qr-scene {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }

    /* 二维码容器：微信 / 企业微信 共用 */
    .qr-frame {
      width: 154px; height: 154px;
      border: 1px solid var(--qr-border);
      border-radius: 2px;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    /* 微信官方 JS-SDK 注入的 iframe 撑满容器 */
    .qr-frame iframe { width: 100% !important; height: 100% !important; border: 0; }

    /* 占位伪二维码（未配置 AppID 时显示） */
    .qr-placeholder {
      width: 116px; height: 116px;
      color: var(--text);
      opacity: 0.15;
    }

    /* 过期遮罩 */
    .qr-expired-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 2px;
      cursor: pointer;
    }
    .qr-expired-mask.show { display: flex; }
    .qr-expired-mask span { color: #fff; font-size: 12px; font-weight: 600; }
    .qr-spin-icon {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      border-top-color: transparent;
      animation: qrspin 1.2s linear infinite;
    }
    @keyframes qrspin { to { transform: rotate(360deg); } }

    .qr-brand-label {
      margin-top: 11px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 平台选择按钮列表（底部） */
    .platform-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .platform-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      text-align: left;
    }

    .platform-btn:hover {
      background: var(--oauth-hover);
      border-color: rgba(120,100,255,0.32);
      transform: translateX(2px);
    }

    .platform-btn.active {
      border-color: var(--accent);
      background: rgba(120,100,255,0.08);
      color: var(--text);
    }

    .platform-btn .p-icon {
      width: 24px; height: 24px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .platform-btn .p-name { flex: 1; }
    .platform-btn .p-status {
      font-size: 11px;
      color: var(--accent2);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .platform-btn.active .p-status { opacity: 1; }

    .left-sep {
      width: 100%;
      height: 1px;
      background: var(--divider);
      margin: 14px 0;
    }

    /* ══════════════════════════════
       右侧：整体紧凑化
    ══════════════════════════════ */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 36px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 30px; height: 30px;
      border-radius: 2px;
      background: var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 3px 10px var(--accent-glow);
    }

    .brand-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    /* 登录方式 Tab（小尺寸） */
    .login-modes {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--divider);
      margin-bottom: 18px;
    }

    .mode-btn {
      padding: 6px 14px 7px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      margin-bottom: -1px;
    }

    .mode-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* 面板 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── 紧凑字段系统 ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      margin-bottom: 8px;
    }

    .form-grid .f-full { grid-column: 1 / -1; }

    .f {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .f lbl {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* 通用 select + input 同高度 */
    .f select, .f input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }

    .f select {
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23666660' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 28px;
      cursor: pointer;
    }

    .f input:focus, .f select:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(120,100,255,0.1);
    }

    .f input::placeholder { color: var(--text-dim); font-size: 12px; }

    /* 账号行：前缀+输入合体 */
    .account-row {
      display: flex;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .account-row:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(120,100,255,0.1);
    }

    .account-prefix {
      display: flex;
      align-items: center;
      padding: 0 9px;
      background: var(--surface3);
      border-right: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
    }

    .account-input {
      flex: 1;
      height: 100%;
      padding: 0 10px;
      background: var(--surface2);
      border: none;
      outline: none;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      min-width: 0;
    }

    .account-input::placeholder { color: var(--text-dim); }

    /* 验证码行 */
    .code-row {
      display: flex;
      gap: 7px;
      align-items: flex-end;
    }

    .code-row .f { flex: 1; }

    .btn-send {
      height: 34px;
      padding: 0 12px;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--accent2);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      font-family: inherit;
      margin-bottom: 0;
    }

    .btn-send:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(120,100,255,0.08);
    }

    .btn-send:disabled { color: var(--text-dim); cursor: default; }

    /* 密码强度条 */
    .pw-strength {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }

    .pw-bar {
      flex: 1;
      height: 2px;
      border-radius: 1px;
      background: var(--surface2);
      transition: background 0.3s;
    }

    /* 子 Tab（验证码/密码/注册） */
    .sub-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--divider);
    }

    .sub-tab {
      padding: 5px 12px 6px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      margin-bottom: -1px;
    }

    .sub-tab.active {
      color: var(--accent2);
      border-bottom-color: var(--accent);
    }

    /* 主按钮 */
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 2px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.18s, transform 0.15s;
      box-shadow: 0 3px 14px var(--accent-glow);
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }

    /* 辅助链接 */
    .aux-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .aux-links a, .aux-links button {
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.18s;
    }

    .aux-links a:hover, .aux-links button:hover { color: var(--accent2); }
    .aux-dot { color: var(--text-dim); }

    /* 提示 */
    .tip {
      font-size: 11px;
      padding: 7px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
      display: none;
      line-height: 1.5;
    }

    .tip.success { background: rgba(52,211,153,0.08); color: var(--success); border: 1px solid rgba(52,211,153,0.18); }
    .tip.error   { background: rgba(248,113,113,0.08); color: var(--error);   border: 1px solid rgba(248,113,113,0.18); }
    .tip.show { display: block; }

    /* 二级展开区（滑入） */
    .sub-fields {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, opacity 0.2s;
      opacity: 0;
    }

    .sub-fields.open {
      max-height: 200px;
      opacity: 1;
    }

    /* section 分隔 */
    .form-sep {
      height: 1px;
      background: var(--divider);
      margin: 10px 0;
    }

    /* 底部 */
    .footer {
      margin-top: auto;
      padding-top: 14px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.9;
    }

    .footer a { color: var(--text-muted); text-decoration: none; }
    .footer a:hover { color: var(--accent2); }

    /* ── 响应式 ── */
    @media (max-width: 640px) {
      .card { flex-direction: column; max-width: 440px; }
      .left { width: 100%; border-right: none; border-bottom: 1px solid var(--divider); padding: 20px 22px; }
      .qr-scene { display: none; }
      .left-sep { display: none; }
      .left-title { margin-bottom: 10px; }
      .platform-list { flex-direction: row; flex-wrap: wrap; }
      .platform-btn { flex: 1; min-width: 100px; }
      .right { padding: 24px 20px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="layout">
  <div class="card">

    <!-- ══ 左侧：第三方登录 ══ -->
    <div class="left">
      <div class="left-title">第三方快捷登录</div>

      <!-- 二维码展示区 -->
      <div class="qr-scene" id="qr-scene">
        <div class="qr-frame" id="qr-frame">
          <div id="qr-placeholder-wrap">
            <svg class="qr-placeholder" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <rect x="5" y="5" width="30" height="30" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
              <rect x="12" y="12" width="16" height="16" rx="1" fill="currentColor"/>
              <rect x="65" y="5" width="30" height="30" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
              <rect x="72" y="12" width="16" height="16" rx="1" fill="currentColor"/>
              <rect x="5" y="65" width="30" height="30" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
              <rect x="12" y="72" width="16" height="16" rx="1" fill="currentColor"/>
              <rect x="42" y="5" width="6" height="6" fill="currentColor"/><rect x="52" y="5" width="6" height="6" fill="currentColor"/>
              <rect x="42" y="14" width="6" height="6" fill="currentColor"/><rect x="52" y="22" width="6" height="6" fill="currentColor"/>
              <rect x="42" y="30" width="6" height="6" fill="currentColor"/><rect x="5" y="42" width="6" height="6" fill="currentColor"/>
              <rect x="14" y="42" width="6" height="6" fill="currentColor"/><rect x="22" y="50" width="6" height="6" fill="currentColor"/>
              <rect x="5" y="58" width="6" height="6" fill="currentColor"/><rect x="42" y="42" width="6" height="6" fill="currentColor"/>
              <rect x="52" y="42" width="6" height="6" fill="currentColor"/><rect x="62" y="42" width="6" height="6" fill="currentColor"/>
              <rect x="42" y="52" width="6" height="6" fill="currentColor"/><rect x="62" y="52" width="6" height="6" fill="currentColor"/>
              <rect x="72" y="42" width="6" height="6" fill="currentColor"/><rect x="82" y="50" width="6" height="6" fill="currentColor"/>
              <rect x="72" y="58" width="6" height="6" fill="currentColor"/><rect x="52" y="62" width="6" height="6" fill="currentColor"/>
              <rect x="62" y="72" width="6" height="6" fill="currentColor"/><rect x="42" y="80" width="6" height="6" fill="currentColor"/>
              <rect x="52" y="72" width="6" height="6" fill="currentColor"/><rect x="82" y="62" width="6" height="6" fill="currentColor"/>
              <rect x="82" y="80" width="6" height="6" fill="currentColor"/><rect x="72" y="72" width="6" height="6" fill="currentColor"/>
            </svg>
          </div>
          <div class="qr-expired-mask" id="qr-expired" onclick="refreshCurrentQR()">
            <div class="qr-spin-icon"></div>
            <span>点击刷新二维码</span>
          </div>
        </div>
        <div class="qr-brand-label" id="qr-label"></div>
      </div>

      <div class="left-sep"></div>

      <div class="platform-list">
        <button class="platform-btn active" id="pb-wechat" onclick="selectPlatform('wechat')">
          <div class="p-icon" style="background:#07C160;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M8.69 11.52c-.57 0-1.03-.46-1.03-1.03s.46-1.03 1.03-1.03c.57 0 1.03.46 1.03 1.03s-.46 1.03-1.03 1.03zm4.14 0c-.57 0-1.03-.46-1.03-1.03s.46-1.03 1.03-1.03c.57 0 1.03.46 1.03 1.03s-.46 1.03-1.03 1.03zm-1.32-9.49C5.58 2.03 1 6.11 1 11.26c0 2.88 1.37 5.45 3.53 7.23-.14.51-.51 1.87-.59 2.17-.1.37.14.37.28.27.11-.08 1.71-1.14 2.4-1.62.86.22 1.76.34 2.69.34 5.93 0 10.69-4.08 10.69-9.39 0-5.15-4.8-9.23-10.69-9.23h.2z"/></svg>
          </div>
          <span class="p-name">微信扫码</span>
          <span class="p-status">当前</span>
        </button>
        <button class="platform-btn" id="pb-wecom" onclick="selectPlatform('wecom')">
          <div class="p-icon" style="background:#1677FF;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M9.5 5.5c-2.76 0-5 2.24-5 5s2.24 5 5 5c.55 0 1.08-.09 1.58-.25.15 1.43.93 2.67 2.08 3.44-1.14.53-2.4.81-3.66.81-4.97 0-9-4.03-9-9s4.03-9 9-9 9 4.03 9 9c0 .66-.07 1.3-.2 1.93-.48-.25-1.02-.38-1.58-.38-.53 0-1.04.12-1.5.33C14.9 10.8 14.5 8 9.5 5.5zm8.25 7.75c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5z"/></svg>
          </div>
          <span class="p-name">企业微信</span>
          <span class="p-status">当前</span>
        </button>
        <button class="platform-btn" id="pb-feishu" onclick="selectPlatform('feishu')">
          <div class="p-icon" style="background:#00B96B;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span class="p-name">飞书</span>
          <span class="p-status">当前</span>
        </button>
        <button class="platform-btn" id="pb-dingtalk" onclick="selectPlatform('dingtalk')">
          <div class="p-icon" style="background:#1677FF; font-size:12px; font-weight:900; color:white; font-family:serif;">钉</div>
          <span class="p-name">钉钉</span>
          <span class="p-status">当前</span>
        </button>
      </div>
    </div>

    <!-- ══ 右侧：账号登录 ══ -->
    <div class="right">
      <div class="brand">
        <div class="brand-icon">🔐</div>
        <span class="brand-name">统一登录</span>
      </div>

      <!-- 登录方式主 Tab -->
      <div class="login-modes">
        <button class="mode-btn active" onclick="switchMode('login')">账号登录</button>
        <button class="mode-btn" onclick="switchMode('register')">注册账号</button>
      </div>

      <!-- ══ 登录面板 ══ -->
      <div class="panel active" id="panel-login">
        <div id="tip-login" class="tip"></div>

        <!-- 一级：账号类型 + 账号所属域 -->
        <div class="form-grid">
          <div class="f">
            <lbl>账号类型</lbl>
            <select id="acct-type" onchange="onAcctTypeChange()">
              <option value="email">邮箱</option>
              <option value="phone">手机号</option>
            </select>
          </div>
          <div class="f" id="f-domain">
            <lbl>账号所属域</lbl>
            <select id="acct-domain">
              <option value="">— 不限 —</option>
              <option value="@gmail.com">Gmail (@gmail.com)</option>
              <option value="@qq.com">QQ 邮箱 (@qq.com)</option>
              <option value="@163.com">网易 (@163.com)</option>
              <option value="@outlook.com">Outlook (@outlook.com)</option>
              <option value="custom">自定义…</option>
            </select>
          </div>
          <div class="f" id="f-dialcode" style="display:none;">
            <lbl>电话区号</lbl>
            <select id="acct-dialcode">
              <option value="+86">+86 中国大陆</option>
              <option value="+852">+852 香港</option>
              <option value="+853">+853 澳门</option>
              <option value="+886">+886 台湾</option>
              <option value="+1">+1 美国/加拿大</option>
              <option value="+44">+44 英国</option>
              <option value="+81">+81 日本</option>
              <option value="+82">+82 韩国</option>
              <option value="+65">+65 新加坡</option>
              <option value="+61">+61 澳大利亚</option>
            </select>
          </div>
        </div>

        <!-- 自定义域名展开 -->
        <div class="sub-fields" id="custom-domain-wrap">
          <div class="form-grid" style="margin-top:0;">
            <div class="f f-full">
              <lbl>自定义域名</lbl>
              <input type="text" id="custom-domain" placeholder="例：@company.com" />
            </div>
          </div>
        </div>

        <div class="form-sep"></div>

        <!-- 二级：账号值 + 子 Tab（验证码/密码） -->
        <div class="sub-tabs">
          <button class="sub-tab active" id="stab-code" onclick="switchLoginSub('code')">验证码</button>
          <button class="sub-tab" id="stab-pw" onclick="switchLoginSub('pw')">密码</button>
        </div>

        <!-- 账号输入（复合行） -->
        <div class="f" style="margin-bottom:8px;">
          <lbl id="acct-label">账号</lbl>
          <div class="account-row">
            <span class="account-prefix" id="acct-prefix">邮箱</span>
            <input class="account-input" id="acct-value" type="email" placeholder="请输入邮箱地址" autocomplete="email" />
          </div>
        </div>

        <!-- 验证码子面板 -->
        <div id="sub-code">
          <div class="code-row">
            <div class="f">
              <lbl>验证码</lbl>
              <input type="text" id="login-code" placeholder="6 位验证码" maxlength="6" inputmode="numeric" />
            </div>
            <button class="btn-send" id="login-send" onclick="sendLoginCode()">获取</button>
          </div>
        </div>

        <!-- 密码子面板 -->
        <div id="sub-pw" style="display:none;">
          <div class="f">
            <lbl>密码</lbl>
            <input type="password" id="login-pass" placeholder="请输入密码" autocomplete="current-password" />
          </div>
        </div>

        <button class="btn-primary" onclick="doLogin()">登录</button>
        <div class="aux-links">
          <button onclick="switchMode('register')">注册账号</button>
          <span class="aux-dot">·</span>
          <a href="#">忘记密码</a>
        </div>
      </div>

      <!-- ══ 注册面板 ══ -->
      <div class="panel" id="panel-register">
        <div id="tip-register" class="tip"></div>

        <div class="form-grid">
          <div class="f">
            <lbl>账号类型</lbl>
            <select id="reg-type" onchange="onRegTypeChange()">
              <option value="email">邮箱</option>
              <option value="phone">手机号</option>
            </select>
          </div>
          <div class="f" id="rf-domain">
            <lbl>账号所属域</lbl>
            <select id="reg-domain" onchange="onRegDomainChange()">
              <option value="">— 不限 —</option>
              <option value="@gmail.com">Gmail</option>
              <option value="@qq.com">QQ 邮箱</option>
              <option value="@163.com">网易</option>
              <option value="@outlook.com">Outlook</option>
              <option value="custom">自定义…</option>
            </select>
          </div>
          <div class="f" id="rf-dialcode" style="display:none;">
            <lbl>电话区号</lbl>
            <select id="reg-dialcode">
              <option value="+86">+86 中国大陆</option>
              <option value="+852">+852 香港</option>
              <option value="+853">+853 澳门</option>
              <option value="+886">+886 台湾</option>
              <option value="+1">+1 美国/加拿大</option>
              <option value="+44">+44 英国</option>
              <option value="+81">+81 日本</option>
            </select>
          </div>
        </div>

        <div class="sub-fields" id="reg-custom-domain-wrap">
          <div class="f f-full" style="margin-top:0;margin-bottom:8px;">
            <lbl>自定义域名</lbl>
            <input type="text" id="reg-custom-domain" placeholder="例：@company.com" />
          </div>
        </div>

        <div class="form-sep"></div>

        <div class="form-grid">
          <div class="f f-full">
            <lbl id="reg-acct-label">邮箱地址</lbl>
            <div class="account-row">
              <span class="account-prefix" id="reg-acct-prefix">邮箱</span>
              <input class="account-input" id="reg-acct" type="email" placeholder="请输入邮箱地址" />
            </div>
          </div>
          <div class="f">
            <lbl>显示名称</lbl>
            <input type="text" id="reg-name" placeholder="可选" />
          </div>
          <div class="f">
            <lbl>密码（≥6位）</lbl>
            <input type="password" id="reg-pass" placeholder="设置密码" oninput="pwStrength(this.value)" />
          </div>
          <div class="f f-full">
            <div class="pw-strength">
              <div class="pw-bar" id="pw-bar-1"></div><div class="pw-bar" id="pw-bar-2"></div>
              <div class="pw-bar" id="pw-bar-3"></div><div class="pw-bar" id="pw-bar-4"></div>
            </div>
          </div>
          <div class="f f-full">
            <lbl>确认密码</lbl>
            <input type="password" id="reg-pass2" placeholder="再次输入" />
          </div>
        </div>

        <button class="btn-primary" onclick="doRegister()">注册</button>
        <div class="aux-links">
          <button onclick="switchMode('login')">已有账号，去登录</button>
        </div>
      </div>

      <div class="footer">
        登录即代表同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a>
      </div>
    </div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  // 平台配置（AppID 等非敏感值，服务端可模板注入）
  // ═══════════════════════════════════════════
  const PLATFORMS = {
    wechat: {
      label: '微信扫码登录', mode: 'qr',
      appId: window.__SSO_WECHAT_APPID__ || '',
      redirectUri: encodeURIComponent(location.origin + '/auth/wechat/callback'),
    },
    wecom: {
      label: '企业微信扫码', mode: 'qr',
      corpId: window.__SSO_WECOM_CORPID__ || '',
      agentId: window.__SSO_WECOM_AGENTID__ || '',
      redirectUri: encodeURIComponent(location.origin + '/auth/wecom/callback'),
    },
    feishu:   { label: '飞书授权登录',   mode: 'redirect', url: '/auth/feishu' },
    dingtalk: { label: '钉钉授权登录',   mode: 'redirect', url: '/auth/dingtalk' },
  };

  const LABEL_ICONS = {
    wechat: `<svg width="14" height="14" viewBox="0 0 24 24" fill="#07C160"><path d="M8.69 11.52c-.57 0-1.03-.46-1.03-1.03s.46-1.03 1.03-1.03c.57 0 1.03.46 1.03 1.03s-.46 1.03-1.03 1.03zm4.14 0c-.57 0-1.03-.46-1.03-1.03s.46-1.03 1.03-1.03c.57 0 1.03.46 1.03 1.03s-.46 1.03-1.03 1.03zm-1.32-9.49C5.58 2.03 1 6.11 1 11.26c0 2.88 1.37 5.45 3.53 7.23-.14.51-.51 1.87-.59 2.17-.1.37.14.37.28.27.11-.08 1.71-1.14 2.4-1.62.86.22 1.76.34 2.69.34 5.93 0 10.69-4.08 10.69-9.39 0-5.15-4.8-9.23-10.69-9.23h.2z"/></svg>`,
    wecom: `<svg width="14" height="14" viewBox="0 0 24 24" fill="#1677FF"><path d="M9.5 5.5c-2.76 0-5 2.24-5 5s2.24 5 5 5c.55 0 1.08-.09 1.58-.25.15 1.43.93 2.67 2.08 3.44-1.14.53-2.4.81-3.66.81-4.97 0-9-4.03-9-9s4.03-9 9-9 9 4.03 9 9c0 .66-.07 1.3-.2 1.93-.48-.25-1.02-.38-1.58-.38-.53 0-1.04.12-1.5.33C14.9 10.8 14.5 8 9.5 5.5zm8.25 7.75c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5z"/></svg>`,
  };

  let currentPlatform = 'wechat';
  let qrExpireTimer = null;

  // ── 平台切换 ──
  function selectPlatform(key) {
    const cfg = PLATFORMS[key];
    if (!cfg) return;

    if (cfg.mode === 'redirect') {
      window.location.href = cfg.url;
      return;
    }

    // 更新高亮
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('pb-' + key).classList.add('active');
    currentPlatform = key;

    // 更新标签
    document.getElementById('qr-label').innerHTML =
      (LABEL_ICONS[key] || '') + ' ' + cfg.label;

    // 清过期遮罩
    clearTimeout(qrExpireTimer);
    document.getElementById('qr-expired').classList.remove('show');

    if (key === 'wechat') renderWechatQR(cfg);
    else if (key === 'wecom') renderWecomQR(cfg);
  }

  function refreshCurrentQR() {
    document.getElementById('qr-expired').classList.remove('show');
    selectPlatform(currentPlatform);
  }

  // ── 微信网页扫码（WxLogin JS-SDK）──
  function renderWechatQR(cfg) {
    const frame = document.getElementById('qr-frame');
    frame.innerHTML = '';
    if (!cfg.appId) {
      showQRPlaceholder('请在 .env 中配置<br>WECHAT_APP_ID 后生效');
      return;
    }
    loadScript('https://res.wx.qq.com/connect/zh_CN/htmledition/js/wxLogin.js', () => {
      new window.WxLogin({
        self_redirect: false,
        id: 'qr-frame',
        appid: cfg.appId,
        scope: 'snsapi_login',
        redirect_uri: cfg.redirectUri,
        state: genState(),
        style: 'black',
      });
      startExpireTimer(300);
    });
  }

  // ── 企业微信扫码（wwLogin JS-SDK）──
  function renderWecomQR(cfg) {
    const frame = document.getElementById('qr-frame');
    frame.innerHTML = '';
    if (!cfg.corpId || !cfg.agentId) {
      showQRPlaceholder('请在 .env 中配置<br>WECOM_CORP_ID / AGENT_ID');
      return;
    }
    loadScript('https://wwcdn.weixin.net.cn/node/wework/wwopen/js/libs/wwLogin-1.2.7.js', () => {
      new window.WwLogin({
        id: 'qr-frame',
        appid: cfg.corpId,
        agentid: cfg.agentId,
        redirect_uri: cfg.redirectUri,
        state: genState(),
        lang: 'zh',
      });
      startExpireTimer(300);
    });
  }

  // ── 工具函数 ──
  function showQRPlaceholder(msg) {
    document.getElementById('qr-frame').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px;text-align:center;">
        <svg width="76" height="76" viewBox="0 0 100 100" style="opacity:.12;color:var(--text);" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="30" height="30" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
          <rect x="12" y="12" width="16" height="16" rx="1" fill="currentColor"/>
          <rect x="65" y="5" width="30" height="30" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
          <rect x="72" y="12" width="16" height="16" rx="1" fill="currentColor"/>
          <rect x="5" y="65" width="30" height="30" rx="3" fill="none" stroke="currentColor" stroke-width="3"/>
          <rect x="12" y="72" width="16" height="16" rx="1" fill="currentColor"/>
          <rect x="42" y="5" width="6" height="6" fill="currentColor"/><rect x="52" y="5" width="6" height="6" fill="currentColor"/>
          <rect x="42" y="42" width="6" height="6" fill="currentColor"/><rect x="62" y="52" width="6" height="6" fill="currentColor"/>
        </svg>
        <p style="font-size:11px;color:var(--text-muted);line-height:1.6;">${msg}</p>
      </div>`;
  }

  function loadScript(src, cb) {
    if (document.querySelector(`script[src="${src}"]`)) { cb?.(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = cb;
    document.head.appendChild(s);
  }

  function genState() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function startExpireTimer(sec) {
    clearTimeout(qrExpireTimer);
    qrExpireTimer = setTimeout(() => {
      document.getElementById('qr-expired').classList.add('show');
    }, sec * 1000);
  }

  // ── 右侧：主 Tab（登录/注册） ──
  function switchMode(m) {
    ['login','register'].forEach((n,i) => {
      document.getElementById('panel-'+n).classList.toggle('active', n===m);
      document.querySelectorAll('.login-modes .mode-btn')[i].classList.toggle('active', n===m);
    });
  }

  // ── 登录子Tab（验证码/密码） ──
  function switchLoginSub(m) {
    document.getElementById('sub-code').style.display = m==='code' ? 'block' : 'none';
    document.getElementById('sub-pw').style.display   = m==='pw'   ? 'block' : 'none';
    document.getElementById('stab-code').classList.toggle('active', m==='code');
    document.getElementById('stab-pw').classList.toggle('active',   m==='pw');
  }

  // ── 登录面板：账号类型切换 ──
  function onAcctTypeChange() {
    const type = document.getElementById('acct-type').value;
    const isEmail = type === 'email';
    document.getElementById('f-domain').style.display    = isEmail ? '' : 'none';
    document.getElementById('f-dialcode').style.display  = isEmail ? 'none' : '';
    if (!isEmail) document.getElementById('custom-domain-wrap').classList.remove('open');
    const inp = document.getElementById('acct-value');
    document.getElementById('acct-prefix').textContent = isEmail ? '邮箱' : '手机';
    inp.type        = isEmail ? 'email' : 'tel';
    inp.placeholder = isEmail ? '请输入邮箱地址' : '请输入手机号';
    inp.maxLength   = isEmail ? 254 : 11;
  }

  document.getElementById('acct-domain').addEventListener('change', function() {
    document.getElementById('custom-domain-wrap').classList.toggle('open', this.value === 'custom');
  });

  // ── 注册面板：账号类型切换 ──
  function onRegTypeChange() {
    const type = document.getElementById('reg-type').value;
    const isEmail = type === 'email';
    document.getElementById('rf-domain').style.display   = isEmail ? '' : 'none';
    document.getElementById('rf-dialcode').style.display = isEmail ? 'none' : '';
    if (!isEmail) document.getElementById('reg-custom-domain-wrap').classList.remove('open');
    const inp = document.getElementById('reg-acct');
    document.getElementById('reg-acct-label').textContent  = isEmail ? '邮箱地址' : '手机号';
    document.getElementById('reg-acct-prefix').textContent = isEmail ? '邮箱' : '手机';
    inp.type        = isEmail ? 'email' : 'tel';
    inp.placeholder = isEmail ? '请输入邮箱地址' : '请输入手机号';
    inp.maxLength   = isEmail ? 254 : 11;
  }

  function onRegDomainChange() {
    document.getElementById('reg-custom-domain-wrap').classList.toggle('open',
      document.getElementById('reg-domain').value === 'custom');
  }

  // ── 提示 ──
  function showTip(panel, type, msg) {
    const el = document.getElementById('tip-'+panel);
    el.className = 'tip' + (type?' '+type:'') + (msg?' show':'');
    el.textContent = msg;
  }

  // ── 倒计时 ──
  function countdown(btnId, s) {
    const btn = document.getElementById(btnId);
    btn.disabled = true;
    const orig = btn.textContent;
    let left = s;
    const iv = setInterval(() => {
      btn.textContent = left + 's'; left--;
      if (left < 0) { clearInterval(iv); btn.disabled = false; btn.textContent = orig; }
    }, 1000);
  }

  // ── 发送验证码 ──
  async function sendLoginCode() {
    const type = document.getElementById('acct-type').value;
    const val  = document.getElementById('acct-value').value.trim();
    const isEmail = type === 'email';
    if (isEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return showTip('login','error','请输入正确的邮箱地址');
    if (!isEmail && !/^1[3-9]\d{9}$/.test(val)) return showTip('login','error','请输入正确的手机号');
    const btn = document.getElementById('login-send');
    btn.disabled = true; btn.textContent = '…';
    try {
      const r = await fetch(isEmail?'/api/email/send-code':'/api/sms/send', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(isEmail?{email:val}:{phone:val})});
      const d = await r.json(); if (!r.ok) throw new Error(d.error);
      showTip('login','success','✓ 验证码已发送'); countdown('login-send', 60);
    } catch(e) { showTip('login','error',e.message||'发送失败'); btn.disabled=false; btn.textContent='获取'; }
  }

  // ── 登录提交 ──
  async function doLogin() {
    const type = document.getElementById('acct-type').value;
    const val  = document.getElementById('acct-value').value.trim();
    const isEmail = type === 'email';
    const isPw = document.getElementById('sub-pw').style.display !== 'none';
    if (!val) return showTip('login','error','请填写账号');
    try {
      let url, body;
      if (isPw) {
        const pass = document.getElementById('login-pass').value;
        if (!pass) return showTip('login','error','请填写密码');
        url = '/api/email/login';
        body = isEmail ? {email:val,password:pass} : {phone:val,password:pass};
      } else {
        const code = document.getElementById('login-code').value.trim();
        if (!code) return showTip('login','error','请填写验证码');
        url  = isEmail ? '/api/email/verify-code' : '/api/sms/verify';
        body = isEmail ? {email:val,code} : {phone:val,code};
      }
      const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d = await r.json(); if (!r.ok) throw new Error(d.error);
      redirect(d.token, d.user);
    } catch(e) { showTip('login','error',e.message||'登录失败'); }
  }

  // ── 注册提交 ──
  async function doRegister() {
    const type  = document.getElementById('reg-type').value;
    const val   = document.getElementById('reg-acct').value.trim();
    const name  = document.getElementById('reg-name').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const pass2 = document.getElementById('reg-pass2').value;
    const isEmail = type === 'email';
    if (!val)          return showTip('register','error','请填写账号');
    if (!pass)         return showTip('register','error','请设置密码');
    if (pass !== pass2) return showTip('register','error','两次密码不一致');
    if (pass.length<6) return showTip('register','error','密码至少 6 位');
    try {
      const body = isEmail ? {email:val,name,password:pass} : {phone:val,name,password:pass};
      const r = await fetch('/api/email/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d = await r.json(); if (!r.ok) throw new Error(d.error);
      redirect(d.token, d.user);
    } catch(e) { showTip('register','error',e.message||'注册失败'); }
  }

  function redirect(token, user) {
    localStorage.setItem('sso_token', token);
    localStorage.setItem('sso_user', JSON.stringify(user));
    window.location.href = '/login-success.html?token='+token+'&name='+encodeURIComponent(user.name||'');
  }

  function pwStrength(v) {
    const s=v.length>=12?4:v.length>=8?3:v.length>=6?2:v.length>0?1:0;
    const c=['','#EF4444','#F59E0B','#3B82F6','#10B981'];
    [1,2,3,4].forEach(i=>document.getElementById('pw-bar-'+i).style.background=i<=s?c[s]:'var(--surface2)');
  }

  const urlErr = new URLSearchParams(location.search).get('error');
  if (urlErr) {
    const msgs={wechat_failed:'微信登录失败',wecom_failed:'企业微信登录失败',feishu_failed:'飞书登录失败',dingtalk_failed:'钉钉登录失败',invalid_state:'登录已过期，请重新发起'};
    showTip('login','error',msgs[urlErr]||('登录失败：'+urlErr));
  }

  document.addEventListener('DOMContentLoaded', () => {
    setQRLabel('wechat', PLATFORMS.wechat);
    renderWechatQR(PLATFORMS.wechat);
  });
</script>

</body>
</html>
